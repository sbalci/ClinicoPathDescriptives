---
name:  benford
title: Benford Analysis
menuGroup: Exploration
menuSubgroup: ClinicoPath Data Quality
version: '1.0.0'
jas: '1.2'

options:
    - name: data
      type: Data
      description:
          R: >
            The data as a data frame.
          jamovi: >
            The data as a data frame.

    - name: var
      title: Variable
      type: Variable
      suggested: [ continuous ]
      permitted: [ numeric ]
      description:
          R: >
            a string naming the variable from `data` that contains the
            continuous values used for the report
          jamovi: >
            a string naming the variable from `data` that contains the
            continuous values used for the report

    - name: digits
      title: Number of digits
      type: Integer
      default: 2
      min: 1
      max: 3
      description:
          R: >
            Number of first digits to analyze (default: 2). Limited to 1-3
            digits; the benford.analysis package does not provide a MAD
            conformity classification beyond 3 digits.
          jamovi: >
            Number of first digits to analyze (1-3)

