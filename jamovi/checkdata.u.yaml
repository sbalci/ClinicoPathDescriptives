title: Single Variable Quality Check
name: checkdata
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Variable to check
        children:
          - type: VariablesListBox
            name: var
            maxItemCount: 1
            isTarget: true
  - type: CollapseBox
    label: Analysis Options
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: showOutliers
          - type: CheckBox
            name: showDistribution
          - type: CheckBox
            name: showDuplicates
          - type: CheckBox
            name: showPatterns
  - type: CollapseBox
    label: Advanced Settings
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: outlierTransform
          - type: TextBox
            name: cvMinMean
            format: number
          - type: TextBox
            name: rareCategoryThreshold
            format: number
          - type: CheckBox
            name: clinicalValidation
          - type: ComboBox
            name: unitSystem
            enable: (clinicalValidation)
          - type: CheckBox
            name: mcarTest
  - type: CollapseBox
    label: Educational Panels
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: showSummary
          - type: CheckBox
            name: showAbout
          - type: CheckBox
            name: showCaveats
