title: Chi-Square Post-Hoc Tests
name: chisqposttest
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Rows
        children:
          - type: VariablesListBox
            name: rows
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Columns
        children:
          - type: VariablesListBox
            name: cols
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Counts (optional)
        children:
          - type: VariablesListBox
            name: counts
            maxItemCount: 1
            isTarget: true
  - type: CollapseBox
    label: Analysis Options
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: posthoc
          - type: TextBox
            name: sig
            format: number
          - type: CheckBox
            name: excl
          - type: CheckBox
            name: exp
          - type: CheckBox
            name: plot
          - type: CheckBox
            name: showResiduals
  - type: CollapseBox
    label: Advanced Settings
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: residualsCutoff
            format: number
          - type: CheckBox
            name: phiCI
          - type: ComboBox
            name: testSelection
          - type: CheckBox
            name: showDetailedTables
  - type: CollapseBox
    label: Output Panels
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: showEducational
          - type: CheckBox
            name: exportResults
          - type: CheckBox
            name: showClinicalSummary
          - type: CheckBox
            name: copyReadySentences
          - type: CheckBox
            name: showAssumptionsCheck
          - type: CheckBox
            name: showGlossary
