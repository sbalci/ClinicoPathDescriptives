---
name:  chisqposttest
title: Chi-Square Post-Hoc Tests
menuGroup: Exploration
menuSubgroup: ClinicoPath Comparisons
version: '1.0.1'
jas: '1.2'

description:
    main: >
          Performs Chi-Square test and post-hoc pairwise comparisons.
          Post-hoc pairwise comparisons are ONLY performed when the overall chi-square
          test is significant (p < α). This enforces proper statistical workflow and
          prevents data dredging.
          Selecting 'None' for post-hoc method DISABLES all pairwise testing. If you
          want unadjusted pairwise comparisons, this feature is not available (by design,
          as it would encourage inappropriate multiple testing).
          No automated validation against established packages exists. Use with caution
          for clinical decision-making.
    # R:
    #     dontrun: true
    #     usage: |
    #         # example will be added

options:
    - name: data
      type: Data
      description:
          R: >
            The data as a data frame.

    - name: rows
      title: Rows
      type: Variable
      suggested: [ ordinal, nominal ]
      permitted: [ factor ]
      description: >
                  variable in the rows

    - name: cols 
      title: Columns
      type: Variable
      suggested: [ ordinal, nominal ]
      permitted: [ factor ]
      description: >
                  variable in the columns

    - name: counts
      title: Counts (optional)
      type: Variable
      suggested: [ continuous ]
      permitted: [ numeric ]
      description: >
                  Frequency/weight variable for contingency table data.
                  When specified, the data is treated as already summarized with counts per combination.
      default: NULL

    - name: posthoc
      title: Post-hoc method
      type: List
      options:
        - title: Bonferroni
          name: bonferroni
        - title: Holm
          name: holm
        - title: FDR
          name: fdr
        - title: None (disable post-hoc)
          name: none
      default: bonferroni
      description: >
                  Method for p-value adjustment in post-hoc tests. IMPORTANT: Selecting
                  'None' DISABLES all pairwise comparisons entirely (not just adjustment).
                  Unadjusted pairwise testing is not supported to prevent inappropriate
                  multiple testing. Choose Bonferroni (most conservative), Holm (less
                  conservative), or FDR (controls false discovery rate) for pairwise testing.

    - name: sig
      title: Significance level
      type: Number
      min: 0.001
      max: 0.1
      default: 0.05
      description: >
                  alpha level for significance testing

    - name: excl
      title: Missing-value exclusion (NA)
      type: Bool
      default: false
      description: >
                  exclude missing values from analysis

    - name: exp
      title: Expected values
      type: Bool
      default: false
      description: >
                  show expected values in the table

    - name: plot
      title: Residual plot
      type: Bool
      default: false
      description: >
                  display plot of standardized residuals

    - name: showResiduals
      title: Residuals analysis
      type: Bool
      default: false
      description: >
                  display standardized residuals analysis with interpretation

    - name: showEducational
      title: Educational panels
      type: Bool
      default: false
      description: >
                  display educational guidance and explanations

    - name: showDetailedTables
      title: Detailed comparison tables
      type: Bool
      default: false
      description: >
                  display individual 2x2 tables for each pairwise comparison

    - name: residualsCutoff
      title: Residual significance cutoff
      type: Number
      min: 1.5
      max: 4.0
      default: 2.0
      description: >
                  critical value for identifying significant residuals (typically 2.0 or 3.0)

    - name: phiCI
      title: Bootstrap confidence intervals for phi
      type: Bool
      default: false
      description: >
                  calculate bootstrap confidence intervals for the Phi coefficient
                  using BCa method (Bias-Corrected and accelerated). Note: This is
                  computationally intensive and may take longer for large tables.

    - name: testSelection
      title: Statistical test selection
      type: List
      options:
        - title: Automatic (recommended)
          name: auto
        - title: Always chi-square
          name: chisquare
        - title: Always Fisher's exact
          name: fisher
      default: auto
      description: >
                  method for selecting statistical test for pairwise comparisons

    - name: exportResults
      title: Detailed results export
      type: Bool
      default: false
      description: >
                  Export comprehensive analysis results to downloadable format for further analysis

    - name: showClinicalSummary
      title: Clinical summary
      type: Bool
      default: false
      description: >
                  Display natural-language summary of results for clinical interpretation

    - name: copyReadySentences
      title: Report sentences
      type: Bool
      default: false
      description: >
                  Generate copy-ready sentences for clinical reports

    - name: showAssumptionsCheck
      title: Assumptions check
      type: Bool
      default: false
      description: >
                  Display validation of chi-square test assumptions

    - name: showGlossary
      title: Statistical glossary
      type: Bool
      default: false
      description: >
                  Display glossary of statistical terms with clinical interpretations
...
