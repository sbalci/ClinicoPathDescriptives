---
name:  crosstable
title: Cross Table
jrs:   '1.1'

items:

    - name: errorNotice
      title: Error
      type: Html
      visible: false
      clearWith:
          - vars
          - group
          - excl

    - name: dataQualityNotice
      title: Data Quality Warnings
      type: Html
      visible: false
      clearWith:
          - vars
          - group
          - excl

    - name: analysisInfo
      title: Analysis Information
      type: Html
      visible: false
      clearWith:
          - vars
          - group
          - sty
          - excl

    - name: subtitle
      title: '`Cross Table - ${group}`'
      type:  Preformatted

    - name: todo
      title: To Do
      type: Html
      visible: true
      clearWith:
          - vars
          - group
          - sty
          - excl

    - name: todo2
      title: To Do
      type: Html
      clearWith:
          - vars
          - group
          - sty
          - excl

    - name: tablestyle1
      title: '`Cross Table - ${group}`'
      type: Html
      clearWith:
          - vars
          - group
          - sty
          - excl
      visible: (sty:arsenal)
      refs: arsenal

    - name: tablestyle2
      title: '`Cross Table - ${group}`'
      type: Html
      clearWith:
          - vars
          - group
          - cont
          - pcat
          - sty
          - excl
      visible: (sty:finalfit)
      refs: finalfit

    - name: tablestyle3
      title: '`Cross Table - ${group}`'
      type: Html
      clearWith:
          - vars
          - group
          - sty
          - excl
      visible: (sty:gtsummary)
      refs: gtsummary

    - name: tablestyle4
      title: '`Cross Table - ${group}`'
      type: Html
      clearWith:
          - vars
          - group
          - sty
          - excl
      visible: (sty:nejm || sty:lancet || sty:hmisc)
      refs: tangram

    - name: qvalueExplanation
      title: "Q-value Explanation"
      type: Html
      visible: false
      clearWith:
          - vars
          - group
          - sty
          - p_adjust
          - excl

    - name: testInformation
      title: "Q-value Information"
      type: Html
      visible: false
      clearWith:
          - vars
          - group
          - sty
          - p_adjust
          - excl

    - name: smdTable
      title: "Standardized Mean Differences (Balance)"
      type: Table
      visible: (showSMD)
      clearWith:
          - vars
          - group
          - showSMD
          - excl
      columns:
          - name: variable
            title: "Variable"
            type: text
          - name: vtype
            title: "Type"
            type: text
          - name: smd
            title: "SMD"
            type: number
          - name: absSMD
            title: "|SMD|"
            type: number
          - name: balance
            title: "Balance"
            type: text

refs:
    - ClinicoPathJamoviModule
    - janitor
    - arsenal
    - finalfit
    - gtsummary
    - tangram

...
