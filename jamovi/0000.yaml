---
title: Descriptives Functions for Clinicopathological Research
name: ClinicoPathDescriptives
version: 1.0.0
jms: '1.0'
authors:
  - Serdar Balci
maintainer: Serdar Balci <serdarbalci@serdarbalci.com>
date: '2026-07-13'
type: R
description: >-
  Descriptives Functions for Clinicopathological Research Descriptive functions
  from ClinicoPath jamovi module. ClinicoPath help researchers to generate
  natural language summaries of their dataset, generate cross tables with
  statistical tests, and survival analysis with survival tables, survival plots,
  and natural language summaries. For comments, suggestions, feature requests or
  reporting bugs, please open an issue at
  <https://github.com/sbalci/ClinicoPathJamoviModule/issues/>.
analyses:
  - title: Table One
    name: tableone
    ns: ClinicoPathDescriptives
    menuGroup: Exploration
    menuSubgroup: ClinicoPath Descriptives
    menuTitle: Table One
    description: >
      This function generates a "Table One", a descriptive summary table
      frequently used in  clinicopathological research manuscripts. It supports
      multiple output styles for flexible formatting.
    ribbon: analyses
    category: analyses
  - title: Summary of Continuous Variables
    name: summarydata
    ns: ClinicoPathDescriptives
    menuGroup: Exploration
    menuSubgroup: ClinicoPath Descriptives
    menuTitle: Summary of Continuous Variables
    description: >
      This module generates descriptive statistics for continuous variables.

      It provides both a textual summary and a visually appealing summary table.

      Optionally, you can enable distribution diagnostics to examine normality,
      skewness, and kurtosis.
    ribbon: analyses
    category: analyses
  - title: Summary of Categorical Variables
    name: reportcat
    ns: ClinicoPathDescriptives
    menuGroup: Exploration
    menuSubgroup: ClinicoPath Descriptives
    menuTitle: Summary of Categorical Variables
    description: >
      Generates a detailed summary of categorical variables including counts,
      percentages, and missing value information. The output is presented in
      both textual and visual formats, making it easy to interpret the
      distribution of your data.
    ribbon: analyses
    category: analyses
  - title: Benford Analysis
    name: benford
    ns: ClinicoPathDescriptives
    menuGroup: Exploration
    menuSubgroup: ClinicoPath Data Quality
    menuTitle: Benford Analysis
    ribbon: analyses
    category: analyses
  - title: Single Variable Quality Check
    name: checkdata
    ns: ClinicoPathDescriptives
    category: analyses
    menuGroup: Exploration
    menuSubgroup: ClinicoPath Data Quality
    menuTitle: Single Variable Quality Check
  - title: Multi-Variable Visual Quality
    name: dataquality
    ns: ClinicoPathDescriptives
    category: analyses
    menuGroup: Exploration
    menuSubgroup: ClinicoPath Data Quality
    menuTitle: Multi-Variable Visual Quality
    description: >
      This module provides data quality assessment including duplicate
      detection,

      missing value analysis, and data completeness summary (similar to sumvar's
      dup() function).
  - title: Outlier Detection
    name: outlierdetection
    ns: ClinicoPathDescriptives
    category: analyses
    menuGroup: Exploration
    menuSubgroup: ClinicoPath Data Quality
    menuTitle: Outlier Detection
    description: >
      Outlier detection using multiple statistical methods from the easystats
      performance package.

      This module provides comprehensive outlier detection through univariate
      methods (Z-scores, IQR, confidence intervals),

      multivariate methods (Mahalanobis distance, MCD, OPTICS, LOF), and
      composite scoring across multiple algorithms.

      Complements existing data quality assessment modules with state-of-the-art
      outlier detection capabilities.

      Perfect for clinical research data quality control and preprocessing.
  - title: Age Pyramid
    name: agepyramid
    ns: ClinicoPathDescriptives
    menuGroup: Exploration
    menuSubgroup: ClinicoPath Descriptive Plots
    menuTitle: Age Pyramid
    ribbon: analyses
    category: analyses
  - title: Venn Diagram
    name: venn
    ns: ClinicoPathDescriptives
    menuGroup: Exploration
    menuSubgroup: ClinicoPath Descriptive Plots
    menuTitle: Venn Diagram
    ribbon: analyses
    menuSubtitle: Venn Diagram, UpSet Plot
    category: analyses
  - title: Variable Tree
    name: vartree
    ns: ClinicoPathDescriptives
    menuGroup: Exploration
    menuSubgroup: ClinicoPath Descriptive Plots
    menuTitle: Variable Tree
    description: >
      Enhanced function for generating comprehensive tree summaries of
      variables. Supports current CRAN vtree package with advanced styling,
      statistical summaries, and interpretation features. Consolidates
      functionality from legacy versions with modern vtree capabilities.
    ribbon: analyses
    category: analyses
  - title: Alluvial Diagrams
    name: alluvial
    ns: ClinicoPathDescriptives
    menuGroup: Exploration
    menuSubgroup: ClinicoPath Descriptive Plots
    menuTitle: Alluvial Diagrams
    ribbon: analyses
    category: analyses
  - title: Cross Tables
    name: crosstable
    ns: ClinicoPathDescriptives
    menuGroup: Exploration
    menuSubgroup: ClinicoPath Comparisons
    menuTitle: Cross Tables
    description: Function for making Cross Tables with multiple table styles.
    ribbon: analyses
    category: analyses
  - title: Chi-Square Post-Hoc Tests
    name: chisqposttest
    ns: ClinicoPathDescriptives
    category: analyses
    menuGroup: Exploration
    menuSubgroup: ClinicoPath Comparisons
    menuTitle: Chi-Square Post-Hoc Tests
    description: >
      Performs Chi-Square test and post-hoc pairwise comparisons. Post-hoc
      pairwise comparisons are ONLY performed when the overall chi-square test
      is significant (p < α). This enforces proper statistical workflow and
      prevents data dredging. Selecting 'None' for post-hoc method DISABLES all
      pairwise testing. If you want unadjusted pairwise comparisons, this
      feature is not available (by design, as it would encourage inappropriate
      multiple testing). No automated validation against established packages
      exists. Use with caution for clinical decision-making.
  - title: Categorize Continuous Variables
    name: categorize
    ns: ClinicoPathDescriptives
    category: analyses
    menuGroup: Exploration
    menuSubgroup: ClinicoPath Data Preparation
    menuTitle: Categorize Continuous Variables
