---
name:  crosstable
title: Cross Tables
menuGroup: Exploration
menuSubgroup: ClinicoPath Comparisons
version: '1.0.1'
jas: '1.2'

description:
    main: |
        Function for making Cross Tables with multiple table styles.

        Currently implemented features:
        - Multiple table styles (arsenal, finalfit, gtsummary, NEJM, Lancet, hmisc)
        - Automatic test selection (chi-square, Fisher's exact, t-test, ANOVA)
        - Multiple testing correction (Bonferroni, Holm, Benjamini-Hochberg, Benjamini-Yekutieli)
        - Variable name safety (special characters, spaces)
        - Data quality validation warnings

        Note: Advanced features (pairwise comparisons, effect sizes, residual analysis,
        correspondence analysis) are planned but not yet available.
    # R:
    #     dontrun: true
    #     usage: |
    #         # Example usage:
    #         # dat <- as.data.frame(your_data)
    #         # ClinicoPathDescriptives::crosstable(
    #         #   data = dat,
    #         #   vars = vars(YourRowVariable),
    #         #   group = "YourGroupingVariable",
    #         #   sty = "finalfit",
    #         #   excl = TRUE,
    #         #   cont = "mean",
    #         #   pcat = "chisq"
    #         # )

options:
    - name: data
      type: Data
      description:
          R: >
            The data as a data frame.
    - name: vars
      title: Dependent variables
      type: Variables
      description: >
            The variable(s) that will appear as rows in the cross table.
    - name: group
      title: Grouping variable
      type: Variable
      suggested: [ ordinal, nominal ]
      permitted: [ factor ]
      description: >
            The variable that will appear as columns (groups) in the table.
    - name: sty
      title: Table style
      type: List
      options:
        - title: arsenal
          name: arsenal
        - title: finalfit
          name: finalfit
        - title: gtsummary
          name: gtsummary
        - title: NEJM
          name: nejm
        - title: Lancet
          name: lancet
        - title: hmisc
          name: hmisc
      default: nejm
    - name: excl
      title: Missing-value exclusion (NA)
      type: Bool
      default: false
      description:
          R: >
            Exclude rows with missing values.
    - name: cont
      title: Mean vs median
      type: List
      options:
        - title: mean
          name: mean
        - title: median
          name: median
      default: mean
    - name: pcat
      title: Chi-square vs Fisher's exact test
      type: List
      options:
        - title: chisq
          name: chisq
        - title: fisher
          name: fisher
      default: chisq

    - name: p_adjust
      title: P-value adjustment method
      type: List
      options:
        - title: None
          name: none
        - title: Bonferroni
          name: bonferroni
        - title: Holm
          name: holm
        - title: Benjamini-Hochberg (FDR)
          name: BH
        - title: Benjamini-Yekutieli
          name: BY
      default: none
      description: >
            Method for adjusting p-values for multiple comparisons across variables.
            Only available with gtsummary table style.

    - name: showSMD
      title: Standardized mean differences (balance)
      type: Bool
      default: false
      description:
          R: >
            Add a standardized mean difference (SMD) column comparing the groups for each
            variable — the standard balance diagnostic for matched, weighted, or propensity
            cohorts. Requires exactly two groups. |SMD| < 0.1 conventionally indicates
            negligible imbalance.
          jamovi: >
            Show a standardized mean difference (SMD) table quantifying between-group balance
            for each variable (continuous and categorical). Requires a two-level grouping
            variable. |SMD| below 0.1 indicates good balance.

...
